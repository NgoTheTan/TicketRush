spring.application.name=TicketRush-backend
spring.config.import=optional:file:.env[.properties],optional:file:TicketRush-backend/.env[.properties]

# ── Database ──────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/ems
spring.datasource.username=cvntrieu
spring.datasource.password=50023080

# ── JPA ───────────────────────────────────────────────────────
# update: tự thêm cột/bảng mới (dùng trong dev). Chuyển sang validate khi production.
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── Flyway ───────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ── JWT ───────────────────────────────────────────────────────
app.jwt.secret=ticketrush-super-secret-key-change-in-production-min32chars
app.jwt.expiration-ms=86400000

# ── Mail / Password reset ─────────────────────────────────────
# Configure these values through environment variables or TicketRush-backend/.env.
# Without RESEND_API_KEY, the backend logs the OTP for local development instead of sending email.
app.mail.resend.api-key=${RESEND_API_KEY:}
app.mail.resend.base-url=${RESEND_BASE_URL:https://api.resend.com}
app.mail.from=${MAIL_FROM:TicketRush <onboarding@resend.dev>}
app.auth.password-reset-otp-ttl-minutes=${PASSWORD_RESET_OTP_TTL_MINUTES:10}
app.google.client-id=${GOOGLE_CLIENT_ID:}
logging.level.org.springframework.web.client=INFO

# ── CORS ──────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:3000

# ── Hold settings ─────────────────────────────────────────────
app.seat.hold-duration-minutes=10

# ── Scheduler (Sprint 3) ───────────────────────────────────────
# Kích hoạt @Scheduled trong Spring
spring.task.scheduling.pool.size=2

# ── Queue settings (Sprint 3) ─────────────────────────────────
# Số user được admit mỗi batch
app.queue.batch-size=50
# Khoảng thời gian giữa mỗi batch (ms)
app.queue.batch-interval-ms=3000
# Thời gian tồn tại của access token sau khi ADMITTED (phút)
app.queue.access-token-ttl-minutes=15

# WebSocket uses the same CORS origin list above.
