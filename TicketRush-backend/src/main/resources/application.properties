spring.application.name=TicketRush-backend

# ── Database ──────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/ems
spring.datasource.username=postgres
spring.datasource.password=tan1042005

# ── JPA ───────────────────────────────────────────────────────
# update: tự thêm cột/bảng mới (dùng trong dev). Chuyển sang validate khi production.
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── Flyway ───────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ── JWT ───────────────────────────────────────────────────────
app.jwt.secret=ticketrush-super-secret-key-change-in-production-min32chars
app.jwt.expiration-ms=86400000

# ── CORS ──────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ── Hold settings ─────────────────────────────────────────────
app.seat.hold-duration-minutes=10

# ── Scheduler (Sprint 3) ───────────────────────────────────────
# Kích hoạt @Scheduled trong Spring
spring.task.scheduling.pool.size=2

# ── Queue settings (Sprint 3) ─────────────────────────────────
# Số user được admit mỗi batch
app.queue.batch-size=50
# Khoảng thời gian giữa mỗi batch (ms)
app.queue.batch-interval-ms=3000
# Thời gian tồn tại của access token sau khi ADMITTED (phút)
app.queue.access-token-ttl-minutes=15

# ── WebSocket CORS ────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:5174
